adhoc:
  description: "Ad-hoc build pipeline — brainstorm → research (parallel) → plan → build → review (parallel)"
  steps:
    - agent: brainstormer
      prompt: |
        De gebruiker wil het volgende bouwen:

        $ORIGINAL

        Voer een brainstorm uit. Stel gerichte vragen (één per keer), verhelder de scope, identificeer randvoorwaarden.
        Output een gestructureerde samenvatting van wat gebouwd moet worden.

    - agent: researcher-codebase
      parallel_group: research
      prompt: |
        Onderzoek de codebase voor de volgende opdracht:

        $INPUT

        Focus op: bestaande patronen, relevante bestanden, dependencies, potentiële conflicten.
        Output een gestructureerd onderzoeksrapport.

    - agent: researcher-external
      parallel_group: research
      prompt: |
        Zoek externe documentatie relevant voor:

        $INPUT

        Focus op: API docs, best practices, libraries die nuttig zijn.
        Output een gestructureerd documentatierapport.

    - agent: planner
      prompt: |
        Maak een implementation plan gebaseerd op:

        Brainstorm samenvatting:
        ---
        $INPUT

        Maak een concreet plan met TDD-taken. Gebruik kleine, onafhankelijke stappen.

    - agent: builder
      prompt: |
        Implementeer het volgende plan met TDD:

        $INPUT

        Regels: schrijf eerst een falende test, dan minimale implementatie, dan refactor.
        Bestanden in src/ (bronlaag), NIET in .pi/ (runtimelaag).

    - agent: reviewer-code
      parallel_group: review
      prompt: |
        Review de code die zojuist is gebouwd voor:

        $ORIGINAL

        Focus op: SOLID, DRY, security, leesbaarheid, naming.
        Output concreet verdict met bevindingen.

    - agent: reviewer-tests
      parallel_group: review
      prompt: |
        Review de tests voor de zojuist gebouwde code:

        $ORIGINAL

        Focus op: dekking, edge cases, TDD discipline, test kwaliteit.
        Output concreet verdict met bevindingen.
